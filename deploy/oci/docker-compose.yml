services:
  vlegal-backend:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VLEGAL_BOOTSTRAP_LIMIT: 500
    container_name: vlegal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ../../data:/app/data

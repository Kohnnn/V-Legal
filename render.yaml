services:
  - type: web
    name: v-legal-prototype
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install uv && uv sync --frozen && uv run python scripts/prepare_demo_bundle.py --limit 500 --seed-only-taxonomy
    startCommand: uv run uvicorn vlegal_prototype.app:app --app-dir src --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: VLEGAL_ENVIRONMENT
        value: production

[build]
  command = "echo 'Static site - no build required'"
  publish = "static"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "http://129.150.58.64:8000/api/:splat"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "18"
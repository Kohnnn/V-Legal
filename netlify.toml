[build]
  command = "echo 'Jinja app served by OCI backend - Netlify acts as proxy/edge'"
  publish = "static"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "https://vlegal.213.35.101.237.sslip.io/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/documents/*"
  to = "https://vlegal.213.35.101.237.sslip.io/documents/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/tracking"
  to = "https://vlegal.213.35.101.237.sslip.io/tracking"
  status = 200
  force = true

[[redirects]]
  from = "/research/*"
  to = "https://vlegal.213.35.101.237.sslip.io/research/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/compare/*"
  to = "https://vlegal.213.35.101.237.sslip.io/compare/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "https://vlegal.213.35.101.237.sslip.io/:splat"
  status = 200
  force = true

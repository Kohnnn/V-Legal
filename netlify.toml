[build]
  command = "echo 'Jinja app served by OCI backend - Netlify acts as proxy/edge'"
  publish = "static"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "https://vlegal.[SITE_HOSTNAME]/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/documents/*"
  to = "https://vlegal.[SITE_HOSTNAME]/documents/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/tracking"
  to = "https://vlegal.[SITE_HOSTNAME]/tracking"
  status = 200
  force = true

[[redirects]]
  from = "/research/*"
  to = "https://vlegal.[SITE_HOSTNAME]/research/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/compare/*"
  to = "https://vlegal.[SITE_HOSTNAME]/compare/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "https://vlegal.[SITE_HOSTNAME]/:splat"
  status = 200
  force = true
